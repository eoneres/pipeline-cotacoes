version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cotacoes-postgres
    environment:
      POSTGRES_USER: cotacoes_user
      POSTGRES_PASSWORD: cotacoes_pass
      POSTGRES_DB: cotacoes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cotacoes-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cotacoes_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cotacoes-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cotacoes_user:cotacoes_pass@postgres:5432/cotacoes_db
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - cotacoes-network
    command: sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cotacoes-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cotacoes-network

volumes:
  postgres_data:


networks:
  cotacoes-network:
    driver: bridge
